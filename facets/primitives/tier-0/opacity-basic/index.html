<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facet — opacity-basic</title>
<!--
facet:
  id: opacity-basic
  tier: 0
  title: Opacity Basic
  description: Pure fade. Opacity 0 → 1 and back.
  tags: [opacity]
  apis: [animate]
  parents: []
-->
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0a0f; font-family: ui-monospace, monospace; }
  body { display: grid; place-items: center; }
  #stage { width: min(90vw, 600px); aspect-ratio: 1 / 1; display: grid; place-items: center; }
  .box { width: 80px; height: 80px; background: #7ef2c3; }
</style>
</head>
<body>
<div id="stage"><div class="box"></div></div>
<script type="module">
import { animate } from '../../../vendor/anime.esm.min.js';

animate('.box', {
  opacity: [1, 0],
  duration: 1200,
  loop: true,
  alternate: true,
});
</script>
</body>
</html>
