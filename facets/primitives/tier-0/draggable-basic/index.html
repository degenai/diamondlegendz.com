<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facet — draggable-basic</title>
<!--
facet:
  id: draggable-basic
  tier: 0
  title: Draggable Basic
  description: One element, pointer-draggable within the stage. Releases with inertia.
  tags: [draggable, pointer]
  apis: [createDraggable]
  parents: []
-->
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0a0f; font-family: ui-monospace, monospace; }
  body { display: grid; place-items: center; }
  #stage { width: min(90vw, 600px); aspect-ratio: 1 / 1; border: 1px dashed #1f1f2e; display: grid; place-items: center; position: relative; }
  .box { width: 70px; height: 70px; background: #7ef2c3; cursor: grab; user-select: none; }
  .box:active { cursor: grabbing; }
</style>
</head>
<body>
<div id="stage"><div class="box"></div></div>
<script type="module">
import { createDraggable } from '../../../vendor/anime.esm.min.js';

createDraggable('.box', {
  container: '#stage',
  releaseEase: 'out(3)',
});
</script>
</body>
</html>
