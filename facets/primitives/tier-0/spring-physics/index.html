<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facet — spring-physics</title>
<!--
facet:
  id: spring-physics
  tier: 0
  title: Spring Physics
  description: Motion driven by spring solver. Natural bounce — stiffness and damping instead of duration.
  tags: [spring, physics, easing]
  apis: [animate, createSpring]
  parents: []
-->
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0a0f; font-family: ui-monospace, monospace; }
  body { display: grid; place-items: center; }
  #stage { width: min(90vw, 600px); aspect-ratio: 1 / 1; display: grid; place-items: center; }
  .box { width: 70px; height: 70px; background: #7ef2c3; }
</style>
</head>
<body>
<div id="stage"><div class="box"></div></div>
<script type="module">
import { animate, createSpring } from '../../../vendor/anime.esm.min.js';

animate('.box', {
  y: [-80, 80],
  ease: createSpring({ mass: 1, stiffness: 70, damping: 8 }),
  loop: true,
  alternate: true,
});
</script>
</body>
</html>
